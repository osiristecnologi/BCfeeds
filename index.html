<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#f7c600"/>
  <title>BCswap</title>
  <link rel="icon" href="assets/logo.jpg"/>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  
  <!-- CSS Externo -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- DRAWER MENU -->
<div id="drawer-overlay" class="drawer-overlay">
  <div class="drawer-bg" id="drawer-bg"></div>
  <aside class="drawer">
    <div class="drawer-header">
      <div class="drawer-brand">
        <img src="assets/logo.jpg" alt="" class="drawer-logo"/>
        <div>
          <div class="drawer-brand-name">BC<span style="color:var(--blue)">swap</span></div>
          <div style="font-size:.72rem;color:var(--t3)">Memecoins Solana</div>
        </div>
      </div>
      <button class="drawer-close" id="drawer-close">✕</button>
    </div>
    <nav class="drawer-nav">
      <div class="d-item active" data-sec="home">🏠 <span class="d-label">Home</span></div>
      <div class="d-item" data-sec="swap">🔄 <span class="d-label">Swap</span></div>
    </nav>
  </aside>
</div>

<!-- TOKEN MODAL -->
<div id="token-modal" class="token-modal">
  <div class="modal-bg" id="modal-bg"></div>
  <div class="modal-sheet">
    <div class="modal-pull"></div>
    <div class="modal-head">
      <div class="modal-tok-row">
        <img id="m-logo" src="" alt="" class="modal-logo" style="display:none"/>
        <div id="m-logo-fb" class="modal-logo-fb"></div>
        <div>
          <div class="modal-tname" id="m-name"></div>
          <div class="modal-tsym"><span id="m-sym"></span> <span class="sol-badge">SOL</span></div>
        </div>
      </div>
      <button class="modal-x" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="m-stats">
        <div class="m-stat"><span class="m-slbl">Preço</span><span class="m-sval" id="m-price"></span></div>
        <div class="m-stat"><span class="m-slbl">24h</span><span class="m-sval" id="m-chg"></span></div>
        <div class="m-stat"><span class="m-slbl">Mkt Cap</span><span class="m-sval" id="m-mcap"></span></div>
        <div class="m-stat"><span class="m-slbl">Volume</span><span class="m-sval" id="m-vol"></span></div>
        <div class="m-stat"><span class="m-slbl">Liquidez</span><span class="m-sval" id="m-liq"></span></div>
        <div class="m-stat"><span class="m-slbl">Rede</span><span class="m-sval">Solana</span></div>
      </div>
      <div class="m-chart-wrap">
        <div class="m-chart-label">📊 Gráfico Tempo Real</div>
        <iframe id="m-chart" class="m-chart" src="" frameborder="0"></iframe>
      </div>
      <div class="m-contract">
        <span class="m-clbl">CA</span>
        <span class="m-caddr" id="m-contract"></span>
        <button class="copy-btn" id="copy-btn">Copiar</button>
      </div>
      <div class="m-links" id="m-links"></div>
      <button class="swap-btn" id="modal-swap-btn">🔄 Swap via Jupiter</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="h-inner">
      <div class="h-left">
        <button class="menu-btn" id="menu-btn">☰</button>
        <a href="#" class="brand">
          <img src="assets/logo.jpg" alt="" class="brand-logo"/>
          <span class="brand-name">BC<span style="color:var(--blue)">swap</span></span>
        </a>
      </div>
    </div>
    <div class="ticker-wrap">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </header>

  <main class="main">
    <section id="sec-home" class="section active">
      <div class="sec-head">
        <h1 class="sec-title">Memecoins Solana</h1>
        <div class="live-dot"><span class="pulse"></span> LIVE</div>
      </div>

      <div class="filter-tabs" id="filter-tabs">
        <div class="ftab active" data-filter="all">🔥 Todos</div>
        <div class="ftab" data-filter="gainers">📈 Gainers</div>
        <div class="ftab" data-filter="losers">📉 Losers</div>
        <div class="ftab" data-filter="volume">💧 Volume</div>
      </div>

      <div class="coin-grid" id="coin-grid"></div>
    </section>
  </main>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" data-sec="home">🏠 <span class="nav-label">Home</span></div>
  <div class="nav-item center-btn" id="nav-swap-btn">
    <div class="nav-icon">🔄</div>
    <span class="nav-label">Swap</span>
  </div>
</nav>

<script src="script.js"></script>
</body>
</html>
